version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - contextcheck
    - durationcheck
    - errorlint
    - gocritic
    - gosec
    - misspell
    - nolintlint
    - revive
    - rowserrcheck
    - whitespace

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: true
  whole-files: true

run:
  timeout: 5m
  relative-path-mode: gomod
  modules-download-mode: readonly
  tests: true
  allow-parallel-runners: true
  allow-serial-runners: true

formatters:
  enable:
    - gofmt

severity:
  default: error
