<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mint Pairing</title>
    <script src="js/qrcode.min.js"></script>
    <style>
        html,
        body {
            pointer-events: none;
            user-select: none;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
            cursor: none;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 44px;
            width: 100%;
            min-height: 100%;
            padding: 48px;
            box-sizing: border-box;
        }

        #qrcode {
            display: flex;
            align-items: center;
            justify-content: center;
            width: min(58vh, 58vw);
            height: min(58vh, 58vw);
            min-width: 320px;
            min-height: 320px;
        }

        #qrcode img,
        #qrcode canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        #pairingCode {
            font-size: clamp(72px, 11vw, 176px);
            font-weight: 800;
            letter-spacing: 0;
            line-height: 1;
            max-width: 92vw;
            overflow-wrap: anywhere;
        }

        #error {
            color: #ff6b6b;
            font-size: 36px;
            line-height: 1.3;
            max-width: 80vw;
        }
    </style>
</head>

<body>
    <main>
        <div id="qrcode"></div>
        <div id="pairingCode"></div>
        <div id="error" hidden></div>
    </main>

    <script>
        function showError(message) {
            document.getElementById("qrcode").innerHTML = "";
            document.getElementById("pairingCode").textContent = "";
            const error = document.getElementById("error");
            error.textContent = message;
            error.hidden = false;
        }

        function render() {
            const params = new URLSearchParams(window.location.search);
            const pairingCode = (params.get("pairing_code") || "").trim();
            if (!pairingCode) {
                showError("No pairing code");
                return;
            }

            document.getElementById("pairingCode").textContent = pairingCode;
            document.getElementById("error").hidden = true;

            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = "";
            const edge = Math.floor(Math.min(window.innerWidth, window.innerHeight) * 0.58);
            new QRCode(qrContainer, {
                text: pairingCode,
                width: edge,
                height: edge,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });
        }

        window.addEventListener("resize", render);
        document.addEventListener("DOMContentLoaded", render);
    </script>
</body>

</html>
