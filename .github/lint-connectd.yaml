name: Lint Connectd

on:
  push:
    branches: [release, develop]
    paths:
      - 'components/feral-connectd/**/*.go'
  pull_request:
    branches: [release, develop]
    paths:
      - 'components/feral-connectd/**/*.go'

jobs:
  lint:
    name: Lint feral-connectd (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./components/feral-connectd
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: components/feral-connectd/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1.6
          working-directory: ./components/feral-connectd

      - name: Run go fmt check
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Code is not formatted. Please run 'gofmt -s -w .'"
            gofmt -s -l .
            exit 1
          fi
