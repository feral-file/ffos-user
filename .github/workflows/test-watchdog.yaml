name: Test Watchdog

on:
  pull_request:
    paths:
      - 'components/feral-watchdog/**/*.go'
      - '.golangci.yml'
      - 'Makefile'
      - 'components/feral-watchdog/go.mod'
      - 'components/feral-watchdog/go.sum'
  workflow_call:
    inputs:
      upload-coverage:
        description: 'Whether to upload coverage results'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: test-watchdog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test feral-watchdog (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.5'
          cache: true
          cache-dependency-path: components/feral-watchdog/go.sum

      - name: Run local verification target
        run: make verify-feral-watchdog-test

      - name: Generate coverage
        if: ${{ inputs.upload-coverage == true }}
        working-directory: ./components/feral-watchdog
        run: go test -v -coverprofile=coverage.out -covermode=atomic $(go list ./... | grep -vE "/mocks|/wrapper")

      - name: Upload coverage to Codecov
        if: ${{ inputs.upload-coverage == true }}
        uses: codecov/codecov-action@v5
        with:
          files: ./components/feral-watchdog/coverage.out
          directory: ./components/feral-watchdog
          slug: feral-file/ffos-user
          flags: feral-watchdog
          name: feral-watchdog-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          override_branch: ${{ github.ref_name }}
          override_build: ${{ github.run_id }}-watchdog
