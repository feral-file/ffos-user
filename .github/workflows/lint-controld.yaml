name: Lint Controld

on:
  push:
    branches: [release, develop]
    paths:
      - 'components/feral-controld/**/*.go'
      - '.golangci.yml'
      - 'Makefile'
      - 'components/Makefile'
      - 'components/feral-controld/go.mod'
      - 'components/feral-controld/go.sum'
      - 'components/mint-pairing-ui/**'
      - 'scripts/test-mint-pairing-ui.sh'
  pull_request:
    paths:
      - 'components/feral-controld/**/*.go'
      - '.golangci.yml'
      - 'Makefile'
      - 'components/Makefile'
      - 'components/feral-controld/go.mod'
      - 'components/feral-controld/go.sum'
      - 'components/mint-pairing-ui/**'
      - 'scripts/test-mint-pairing-ui.sh'

permissions:
  contents: read

concurrency:
  group: lint-controld-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint feral-controld (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: true
          cache-dependency-path: components/feral-controld/go.sum

      - name: Install golangci-lint
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.4.0

      - name: Run local verification target
        run: make verify-feral-controld-lint
