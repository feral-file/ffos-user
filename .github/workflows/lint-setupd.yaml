name: Lint Setupd

on:
  push:
    branches: [release, develop]
    paths:
      - 'components/feral-setupd/src/**'
  pull_request:
    paths:
      - 'components/feral-setupd/src/**'

jobs:
  lint:
    name: Lint feral-setupd (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./components/feral-setupd
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy
          override: true

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            components/feral-setupd/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('components/feral-setupd/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run cargo check
        run: cargo check --all-targets --all-features --verbose
