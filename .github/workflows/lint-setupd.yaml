name: Lint Setupd

on:
  push:
    branches: [release, develop]
    paths:
      - 'components/feral-setupd/src/**'
      - 'components/feral-setupd/Cargo.toml'
      - 'components/feral-setupd/Cargo.lock'
      - 'components/feral-setupd/rustfmt.toml'
      - 'components/feral-setupd/clippy.toml'
      - 'Makefile'
      - 'scripts/verify-setupd-docker.sh'
  pull_request:
    paths:
      - 'components/feral-setupd/src/**'
      - 'components/feral-setupd/Cargo.toml'
      - 'components/feral-setupd/Cargo.lock'
      - 'components/feral-setupd/rustfmt.toml'
      - 'components/feral-setupd/clippy.toml'
      - 'Makefile'
      - 'scripts/verify-setupd-docker.sh'

permissions:
  contents: read

concurrency:
  group: lint-setupd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint feral-setupd (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy
          override: true

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            components/feral-setupd/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('components/feral-setupd/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run local verification target
        run: make verify-setupd-lint
